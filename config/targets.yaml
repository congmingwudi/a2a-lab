# Target registry: every remote agent the lab can call, resolved by the
# bridge, the shims, custom tools, and scripts/matrix.py.
#
# status legend (be honest — this feeds plan/02-matrix.md):
#   native       the platform speaks this protocol itself
#   via-bridge   Path A: Agentforce REST callout -> bridge -> this protocol
#   via-shim     Path B: this protocol -> shim -> Agentforce Agent API
#   blocked-beta the native path exists but is gated (documented, not run)
#
# ${VAR} values expand from the environment (.env).

# Our own servers (claude-*, shims) enforce A2ALAB_TOKEN when set, so every
# client hop to them sends it; unset (local dev) both sides skip auth.
targets:
  # ---- Claude research agent (hosted by us; backend = managed|sdk via CLAUDE_BACKEND)
  claude-rest:
    platform: claude
    protocol: rest
    endpoint: http://localhost:8001
    status: native
    auth: {header_name: x-lab-token, header_value: "${A2ALAB_TOKEN}"}
  claude-mcp:
    platform: claude
    protocol: mcp
    endpoint: http://localhost:8002/mcp
    status: native
    auth: {header_name: x-lab-token, header_value: "${A2ALAB_TOKEN}"}
  claude-a2a:
    platform: claude
    protocol: a2a
    endpoint: http://localhost:8003
    status: native
    auth: {header_name: x-lab-token, header_value: "${A2ALAB_TOKEN}"}
  # The AWS-hosted twin (D26): the sdk backend containerized on Bedrock
  # AgentCore Runtime — the self-hosted counterpart to the Managed Agents
  # default, and the apples-to-apples peer of openai-agentcore. Same
  # deploy path: deploy/agentcore/deploy.sh claude
  claude-agentcore:
    platform: claude
    protocol: agentcore-http
    status: native
    # warmup: cold starts (~56s here, ~31s openai) blow demo budgets — the
    # console's warm-up panel pings flagged targets and records durations
    options: {timeout: 110, warmup: true}
    auth: {runtime_arn: "${CLAUDE_AGENTCORE_ARN}"}

  # ---- Agentforce (hosted by Salesforce)
  agentforce-rest:
    platform: agentforce
    protocol: agentforce-api   # GA Agent API — the native cell
    status: native
  agentforce-mcp:
    platform: agentforce
    protocol: mcp
    endpoint: http://localhost:8021/mcp
    status: via-shim
    auth: {header_name: x-lab-token, header_value: "${A2ALAB_TOKEN}"}
  agentforce-a2a:
    platform: agentforce
    protocol: a2a
    endpoint: http://localhost:8023
    status: via-shim
    auth: {header_name: x-lab-token, header_value: "${A2ALAB_TOKEN}"}

  # The OpenAI-paired Agentforce twin (ADR D25): same org/credentials,
  # different agent — its external-research action targets openai-rest.
  agentforce-openai-rest:
    platform: agentforce
    protocol: agentforce-api
    status: native
    auth:
      my_domain: "${SF_MY_DOMAIN}"
      client_id: "${SF_CLIENT_ID}"
      client_secret: "${SF_CLIENT_SECRET}"
      agent_id: "${SF_OPENAI_AGENT_ID}"

  # ---- OpenAI agent (M9/Path C — hosted by us; backend = stub|agents-sdk
  # via OPENAI_BACKEND; the agents-sdk backend is the Codex deliverable,
  # plan/06-openai-codex-handoff.md)
  openai-rest:
    platform: openai
    protocol: rest
    endpoint: http://localhost:8011
    status: native
    auth: {header_name: x-lab-token, header_value: "${A2ALAB_TOKEN}"}
  openai-mcp:
    platform: openai
    protocol: mcp
    endpoint: http://localhost:8012/mcp
    status: native
    auth: {header_name: x-lab-token, header_value: "${A2ALAB_TOKEN}"}
  openai-a2a:
    platform: openai
    protocol: a2a
    endpoint: http://localhost:8013
    status: native
    auth: {header_name: x-lab-token, header_value: "${A2ALAB_TOKEN}"}
  # The AWS-hosted variant (D4/D24): Bedrock AgentCore Runtime, IAM-authed
  # data plane (invoke_agent_runtime) — no raw HTTP endpoint exists, so the
  # client is boto3-based. Same container handler as openai-rest.
  openai-agentcore:
    platform: openai
    protocol: agentcore-http
    status: native
    options: {timeout: 110, warmup: true}
    auth: {runtime_arn: "${OPENAI_AGENTCORE_ARN}"}

  # The ADK-paired Agentforce twin (ADR D25): same org/credentials,
  # different agent — its external-research action targets adk-a2a.
  agentforce-adk-rest:
    platform: agentforce
    protocol: agentforce-api
    status: native
    auth:
      my_domain: "${SF_MY_DOMAIN}"
      client_id: "${SF_CLIENT_ID}"
      client_secret: "${SF_CLIENT_SECRET}"
      agent_id: "${SF_ADK_AGENT_ID}"

  # ---- Google ADK agent (WS2 — hosted on Vertex AI Agent Engine)
  # The lab's first remote cell where the PLATFORM speaks A2A natively:
  # both ends native, no bridge, no shim. IAM data plane (google-adc
  # bearer), card served at /v1/card (not /.well-known). Scale-to-zero
  # (min_instances=0, personal GCP account) — hence warmup.
  adk-a2a:
    platform: adk
    protocol: a2a
    endpoint: "${ADK_A2A_ENDPOINT}"
    status: native
    # transport pinned: the preview A2A surface serves messages but its
    # public card route 404s — the client builds a minimal card locally
    # instead of discovering (honest preview roughness, noted in matrix)
    options: {timeout: 65, transport: http_json, warmup: true}
    auth: {scheme: google-adc}

# Deployment modes (D26): A2ALAB_MODE=hosted transparently remaps these
# names wherever a client is resolved (bridge, custom tools, console runs) —
# one env flip moves every experiment from local servers to the AgentCore
# runtimes with no Salesforce or scenario changes. scripts/matrix.py is
# exempt (exact=True): a matrix cell always measures the target it names.
# Restart the stack after flipping — bridge/console cache clients per name.
modes:
  hosted:
    claude-rest: claude-agentcore
    openai-rest: openai-agentcore
