# Primary demo scenarios: end-to-end cross-platform call paths, shown as
# cards at the top of the lab console. Each resolves to a target (from
# targets.yaml) plus routing/prompt behavior. status: live | coming-soon.
#
# prompt_suffix is appended to the operator's prompt to make the
# cross-platform hop deterministic in demos (the model still decides, but
# reliably).
#
# flow:   the planned call path, rendered as a sequence diagram + numbered
#         steps in the console's scenario detail view BEFORE a run. Use the
#         participant names the trace layer records (remote-caller,
#         claude-researcher, anthropic-managed-agents, agentforce-client,
#         client, bridge, agentforce-apex) so the planned diagram lines up
#         with the live one that streams in after "Run".
# agents: the agents at each end; `target` names an a2a target in
#         targets.yaml — the console fetches that server's live
#         /.well-known/agent-card.json on demand.

# Nav groups: second-level sections under "Experiments" — one per platform
# pair. `upcoming` groups render as collapsed placeholders tied to the
# roadmap workstreams (plan/07-workstreams.md) until their scenarios land.
groups:
  - id: claude-agentforce
    title: "Claude - Agentforce"
  - id: openai-agentforce
    title: "OpenAI - Agentforce"
  - id: adk-agentforce
    title: "Google ADK - Agentforce"
  - id: foundry-agentforce
    title: "Microsoft Foundry - Agentforce"
  - id: langgraph-agentforce
    title: "LangGraph - Agentforce"
    upcoming: WS4
  - id: strands-agentforce
    title: "AWS Strands - Agentforce"
    upcoming: WS5

scenarios:
  claude-to-agentforce:
    af_channel_toggle: true
    group: claude-agentforce
    title: "Claude → Agentforce"
    summary: >-
      Claude Managed Agent calls an Agentforce Agent via A2A protocol.
    description: >-
      You talk to the Claude research agent; mid-answer it consults the
      Agentforce service agent through its ask_agentforce tool (Salesforce
      Agent API) and folds the reply into its answer.
    target: claude-rest
    via_bridge: false
    status: live
    tags: [claude, managed-agents, agentforce, agent-api]
    prompt_suffix: >-
      Consult the Salesforce Agentforce agent with your ask_agentforce tool
      as part of answering, and say what it contributed.
    flow:
      - source: remote-caller
        target: claude-researcher
        protocol: rest
        detail: >-
          You (the console) call the Claude research agent: REST POST /ask on
          :8001. "remote-caller" is how the server-side trace records whoever
          invoked it.
      - source: claude-researcher
        target: anthropic-managed-agents
        protocol: managed-agents-api
        detail: >-
          The adapter drives a hosted Anthropic Managed Agents session — open
          the event stream, send the message, collect the answer. The API key
          stays on the lab host; the sandbox holds no credentials.
      - source: agentforce-client
        target: agentforce
        protocol: agentforce-api
        detail: >-
          Mid-answer the model emits an ask_agentforce custom-tool call on
          the event stream. The lab executes it host-side — OAuth
          client-credentials, then session + message against the Salesforce
          Agent API — and returns only the tool result to the sandbox.
          Session create / message / delete each record their own hop.
    agents:
      - title: Claude research agent
        target: claude-a2a
        caption: >-
          Native card — generated at startup by the lab's a2a-sdk server on
          :8003 from the mounted adapter's name and description.
      - title: Agentforce service agent
        target: agentforce-a2a
        caption: >-
          Shim card — Agentforce publishes no A2A surface, so the lab's shim
          on :8023 generates this card and proxies inbound A2A to the GA
          Agent API. Honest status: via-shim.

  agentforce-to-claude:
    group: claude-agentforce
    title: "Agentforce → Claude"
    summary: >-
      Agentforce Agent calls a Claude Managed Agent via A2A protocol and waits for a response.
    description: >-
      The SYNCHRONOUS delegation pattern: you talk to the Agentforce service
      agent, which answers the account question from its own Salesforce data
      (Apex action over Account, open Opportunities, Cases), then delegates
      outside-in market research to the Claude agent through the lab bridge
      — and replies with both, each contribution clearly attributed, inside
      one conversation turn. This proves the A2A wire path and measures the
      response-time budget (Agentforce action ~60s → Apex 110s → bridge 45s),
      which is exactly what caps how deep synchronous research can go — the
      async experiment below is the escape from that cap.
    target: agentforce-rest
    via_bridge: false
    status: live
    tags: [agentforce, agent-api, bridge, claude, managed-agents]
    note: >-
      The Salesforce-internal legs mint their own trace id (the Apex
      invocable generates one per callout), so the Apex → bridge → Claude
      hops arrive under a second trace. The console folds that leg into the
      turn's call path automatically (hops tagged "leg …", correlated by
      time window); it also appears standalone in the Traces panel. The
      market research is clearly labeled as synthetic demo intel.
    flow:
      - source: agentforce-client
        target: agentforce
        protocol: agentforce-api
        detail: >-
          You talk to the Agentforce agent over the GA Agent API (session +
          message). Its "Customer account status" topic owns the whole
          answer and orchestrates the collaboration.
      - source: agentforce
        target: agentforce-apex
        protocol: internal
        detail: >-
          STEP 1 — internal truth: the agent calls its A2ALab: Get Account
          Summary action (Apex SOQL over Account + open Opportunities +
          open Cases). CRM data never leaves the org.
      - source: agentforce-apex
        target: bridge
        protocol: rest
        detail: >-
          STEP 2 — external delegation: the agent's A2ALab: Ask Remote Agent
          action POSTs through the Named Credential (X-Bridge-Token) and
          Cloudflare tunnel to the lab bridge, asking only for outside-in
          market research — it explicitly tells the researcher not to fetch
          CRM data it already has.
      - source: client
        target: claude-rest
        protocol: rest
        detail: >-
          The bridge resolves claude-rest in config/targets.yaml and forwards
          over the configured protocol — switch this leg to MCP or A2A with a
          yaml edit, no Salesforce redeploy.
      - source: claude-researcher
        target: anthropic-managed-agents
        protocol: managed-agents-api
        detail: >-
          Claude produces the market research in a hosted Managed Agents
          session and does NOT call its ask_agentforce tool back — a
          recursive loop would add nothing. The research returns up the same
          path, and the Agentforce agent folds it into a reply with two
          labeled sections: "From our CRM" and "External market research".
    agents:
      - title: Agentforce service agent
        target: agentforce-a2a
        caption: >-
          Shim card — Agentforce publishes no A2A surface, so the lab's shim
          on :8023 generates this card and proxies inbound A2A to the GA
          Agent API. Honest status: via-shim.
      - title: Claude research agent
        target: claude-a2a
        caption: >-
          Native card — generated at startup by the lab's a2a-sdk server on
          :8003 from the mounted adapter's name and description.

  claude-aws-to-agentforce:
    af_channel_toggle: true
    group: claude-agentforce
    title: "Claude (AWS) → Agentforce"
    summary: >-
      The self-hosted Claude Agent SDK on Bedrock AgentCore calls the
      Agentforce Agent mid-answer — cross-cloud AWS → Salesforce.
    description: >-
      The hosting-model twin of Claude → Agentforce (ADR D26): the SAME
      Claude adapter, but self-hosted — the Claude Agent SDK containerized
      on Bedrock AgentCore Runtime instead of Anthropic Managed Agents. You
      invoke the AWS runtime (IAM-authed invoke_agent_runtime; there is no
      public HTTP endpoint); inside the container the SDK spawns the Claude
      Code CLI, and mid-answer the agent consults Agentforce through its
      in-process ask_agentforce tool — Salesforce credentials live in the
      container env here, versus host-side under managed (the
      credential-locality contrast is the point). The outbound question
      carries the D27 delegation rider — visible in this leg's raw wire
      payload.
    target: claude-agentcore
    via_bridge: false
    status: live
    tags: [claude, agent-sdk, agentcore, agentforce, agent-api]
    prompt_suffix: >-
      Consult the Salesforce Agentforce agent with your ask_agentforce tool
      as part of answering, and say what it contributed.
    note: >-
      Cold start matters here: first invoke after idle or a runtime update
      is ~56s (vs ~31s for the OpenAI runtime — the harness-vs-thin-SDK
      footprint contrast, see Insights). Use the warm-up gear before
      demoing.
    flow:
      - source: remote-caller
        target: claude-agentcore
        protocol: agentcore-http
        detail: >-
          You (the console) invoke the AWS-hosted runtime via boto3
          invoke_agent_runtime — SigV4/IAM only, no public endpoint, no
          bearer token (the IAM data plane replaces app-level auth). The
          payload lands on the container's POST /invocations.
      - source: claude-researcher
        target: claude-agent-sdk
        protocol: internal
        detail: >-
          Inside the container the adapter drives the Claude Agent SDK,
          which spawns the Claude Code CLI (Node) as a subprocess — the
          full agent harness runs in the container, calling the Anthropic
          API with the key from the runtime env.
      - source: agentforce-client
        target: agentforce
        protocol: agentforce-api
        detail: >-
          Mid-answer the model calls ask_agentforce (in-process SDK MCP
          tool). The container itself performs OAuth + session + message
          against the Salesforce Agent API — a cross-cloud AWS→Salesforce
          hop, with the D27 delegation rider stamped on the outbound
          question (depth 1: the twin is asked not to delegate onward).
    agents:
      - title: Claude research agent (AgentCore, sdk backend)
        target: claude-a2a
        caption: >-
          Same adapter as the managed variant — the A2A card is generated
          from the same mounted adapter; only the hosting differs (D26).
      - title: Agentforce service agent
        target: agentforce-a2a
        caption: >-
          Shim card — Agentforce publishes no A2A surface, so the lab's shim
          proxies inbound A2A to the GA Agent API. Honest status: via-shim.

  agentforce-to-claude-aws:
    group: claude-agentforce
    title: "Agentforce → Claude (AWS)"
    summary: >-
      The Agentforce Agent delegates research through the bridge to the
      AWS-hosted Claude runtime instead of Managed Agents.
    description: >-
      Agentforce → Claude (sync) with the Claude end self-hosted on Bedrock
      AgentCore (ADR D26). Same Salesforce entry point, same twin, same
      Apex action, same bridge — the ONLY change is A2ALAB_MODE=hosted,
      under which the bridge resolves claude-rest to claude-agentcore and
      forwards over IAM-authed invoke_agent_runtime. One env flip moves the
      experiment across hosting models with no Salesforce redeploy — that
      is the deployment-mode seam working as designed. The bridge stamps
      the D27 delegation rider on the forwarded question (visible in the
      raw wire payload of the bridge → AgentCore leg).
    target: agentforce-rest
    via_bridge: false
    requires_mode: hosted
    status: live
    tags: [agentforce, agent-api, bridge, claude, agent-sdk, agentcore]
    note: >-
      Requires A2ALAB_MODE=hosted (the mode badge shows the active mode) —
      in local mode the run is refused with instructions rather than
      silently testing the wrong hosting. Warm the runtime first: a ~56s
      cold start inside the bridge's 45s budget fails the sync turn — that
      stacked-timeout reality is itself one of the lab's findings.
    flow:
      - source: agentforce-client
        target: agentforce
        protocol: agentforce-api
        detail: >-
          You talk to the Agentforce agent over the GA Agent API — the same
          Claude-paired twin as the managed variant (one twin per platform
          pair, D25; hosting mode is not a new platform).
      - source: agentforce
        target: agentforce-apex
        protocol: internal
        detail: >-
          STEP 1 — internal truth: A2ALab: Get Account Summary (Apex SOQL
          over Account + open Opportunities + open Cases). CRM data never
          leaves the org.
      - source: agentforce-apex
        target: bridge
        protocol: rest
        detail: >-
          STEP 2 — external delegation: the agent's action POSTs through
          the Named Credential and tunnel to the lab bridge with
          target=claude-rest — the SAME pinned input as the managed
          variant; Salesforce is unaware hosting changed.
      - source: client
        target: claude-agentcore
        protocol: agentcore-http
        detail: >-
          Under A2ALAB_MODE=hosted the bridge resolves claude-rest →
          claude-agentcore and invokes the AWS runtime via boto3
          invoke_agent_runtime (SigV4). The forwarded question carries the
          D27 delegation rider at depth 1 — inspect this hop's raw request
          payload to see it on the wire.
      - source: claude-researcher
        target: claude-agent-sdk
        protocol: internal
        detail: >-
          The containerized Claude Agent SDK produces the market research
          and does NOT call back to Agentforce — the rider's directive and
          the depth guard both stand between this leg and a circular
          claude→agentforce→claude chain (D27).
    agents:
      - title: Agentforce service agent
        target: agentforce-a2a
        caption: >-
          Shim card — the lab's shim proxies inbound A2A to the GA Agent
          API. Honest status: via-shim.
      - title: Claude research agent (AgentCore, sdk backend)
        target: claude-a2a
        caption: >-
          Same adapter, same card — only the hosting differs from the
          managed variant (D26).

  account-brief-async:
    group: claude-agentforce
    title: "Account Intelligence Brief (async)"
    summary: >-
      A scheduled Claude Managed Agent runs long running tasks and updates
      Salesforce daily.
    description: >-
      The ASYNCHRONOUS pattern — what Claude Managed Agents is actually
      designed for. A scheduled deployment (Anthropic's platform-native
      cron) fires a LONG-RUNNING research session daily: the managed agent
      spends minutes doing multi-source web research on the account — news,
      competitor moves, government & regulatory developments, geopolitics —
      then delivers the aggregated brief into Salesforce: in an A2ALab Account Brief record, 
      an activity crediting the Claude Managed Agent, and an
      in-app alert. Nothing waits on a 60-second action timeout, because
      nothing is waiting at all. "Run" here fires the same daily job
      ad-hoc; the reply is an acknowledgment and the call path streams in
      live as the research runs (expect minutes, not seconds).
    mode: async
    account: "Apple Inc."
    status: live
    tags: [claude, managed-agents, agentforce, daily-brief]
    note: >-
      Why this architecture: the brief lands in A2ALab_Account_Brief__c
      (long-text Brief__c) precisely so Data 360 can index it for VECTOR
      SEARCH (M10) — the Agentforce agent then retrieves the freshest,
      most relevant research at answer time to ground account questions and
      generate sales plays, instead of doing (or waiting on) research
      mid-conversation. The sync experiment above is the same delegation
      compressed into one turn; this one is the architectural decision to
      move deep research out of the conversation entirely: schedule it,
      let it run long, store the result where the CRM agent's retrieval
      layer can find it, and notify humans in-channel when it lands.
    flow:
      - source: anthropic-scheduler
        target: brief-researcher
        protocol: managed-agents-api
        detail: >-
          Daily cron: an Anthropic SCHEDULED DEPLOYMENT (the platform's
          native scheduler) fires a managed session with the research
          kickoff — no lab-host scheduler involved. The console's Run button
          triggers the same job ad-hoc; `python -m briefs --watch` services
          the cron-fired sessions.
      - source: brief-researcher
        target: web
        protocol: internal
        detail: >-
          LONG-RUNNING multi-source research in the managed sandbox:
          repeated web_search / web_fetch calls across news, competitor,
          regulatory/government-relations, and geopolitical angles. Each
          lookup appears as a hop here; this phase runs for minutes — the
          whole point of the async pattern is that it's allowed to.
      - source: brief-worker
        target: brief-researcher
        protocol: managed-agents-api
        detail: >-
          Delivery: the agent calls its save_account_brief custom tool
          exactly once. The tool surfaces on the event stream and is
          executed HOST-SIDE by the lab's brief worker — Salesforce
          credentials never enter the Anthropic sandbox (same security
          model as ask_agentforce in the sync scenarios).
      - source: brief-worker
        target: salesforce-org
        protocol: rest
        detail: >-
          The worker inserts an A2ALab_Account_Brief__c record — the full
          markdown brief in the long-text Brief__c field, linked to the
          Account, stamped with Brief_Date__c, Source__c ("Claude managed
          agent") and the Anthropic Research_Session_Id__c for
          traceability. This is the field Data 360 vector-indexes so the
          Agentforce agent can ground account answers and sales plays in
          the latest research.
      - source: brief-worker
        target: salesforce-org
        protocol: rest
        detail: >-
          Awareness: a completed Task (activity) is logged on the Account —
          "Daily account brief available … provided by a Claude managed
          agent" — and the A2ALab_Brief_Alert custom notification fires an
          in-app (bell) alert linking straight to the new brief record.
    agents:
      - title: Agentforce service agent (downstream consumer)
        target: agentforce-a2a
        caption: >-
          Not called during the run — it CONSUMES the result: with the
          Brief__c corpus vector-indexed in Data 360, this agent answers
          account questions and drafts sales plays grounded in the latest
          brief. Shim card shown for reference; honest status via-shim.

  chatgpt-to-agentforce:
    af_channel_toggle: true
    group: openai-agentforce
    title: "OpenAI (AWS) → Agentforce"
    summary: >-
      An OpenAI agent calls the Agentforce Agent mid-answer.
    description: >-
      The mirror of Claude → Agentforce, on the OpenAI platform: you talk to
      the OpenAI research agent (OpenAI Agents SDK, Codex-built backend);
      mid-answer it consults the Agentforce agent through its ask_agentforce
      function tool (Salesforce Agent API) and folds the reply into its
      answer. Per ADR D25 it talks to a dedicated OpenAI-PAIRED Agentforce
      twin whose external research targets OpenAI — never Claude — so this
      experiment stays a closed two-platform system.
    target: openai-rest
    via_bridge: false
    status: live
    tags: [openai, agents-sdk, agentforce, agent-api]
    prompt_suffix: >-
      Consult the Salesforce Agentforce agent with your ask_agentforce tool
      as part of answering, and say what it contributed.
    flow:
      - source: remote-caller
        target: openai-researcher
        protocol: rest
        detail: >-
          You (the console) call the OpenAI research agent: REST POST /invoke
          on :8011 (locally; AgentCore-hosted in the cloud variant, M9).
      - source: openai-researcher
        target: openai-platform
        protocol: internal
        detail: >-
          The Agents SDK runs the turn on the OpenAI platform (model from
          OPENAI_MODEL). The hop records the OpenAI response id as
          platform_ref — captured at emit time because OpenAI exposes no
          trace read-back API (D18/M9).
      - source: agentforce-client
        target: agentforce
        protocol: agentforce-api
        detail: >-
          Mid-answer the model calls its ask_agentforce function tool. The
          lab executes it host-side against the OPENAI-PAIRED Agentforce
          twin (SF_OPENAI_AGENT_ID) — OAuth client-credentials, then
          session + message on the Agent API. Credentials never enter
          prompts or tool schemas.
    agents:
      - title: OpenAI research agent
        target: openai-a2a
        caption: >-
          Native card — generated at startup by the lab's a2a-sdk server on
          :8013 from the mounted adapter's name and description.
      - title: Agentforce service agent (OpenAI-paired twin)
        target: agentforce-a2a
        caption: >-
          Shim card — Agentforce publishes no A2A surface, so the lab's shim
          generates this card and proxies inbound A2A to the GA Agent API.
          Honest status: via-shim.

  agentforce-to-chatgpt:
    group: openai-agentforce
    title: "Agentforce → OpenAI (AWS)"
    summary: >-
      Agentforce Agent delegates research to an OpenAI agent via the bridge
      and waits for a response.
    description: >-
      The mirror of Agentforce → Claude (sync): you talk to the OpenAI-paired
      Agentforce twin (ADR D25), which answers the account question from its
      own Salesforce data (Apex action over Account, open Opportunities,
      Cases), then delegates outside-in market research to the OPENAI agent
      through the lab bridge — replying with both, each contribution clearly
      attributed, inside one conversation turn and the same timeout budget
      (action ~60s → Apex 110s → bridge 45s → OpenAI 40s).
    target: agentforce-openai-rest
    via_bridge: false
    status: live
    tags: [agentforce, agent-api, bridge, openai, agents-sdk]
    note: >-
      The Salesforce-internal legs mint their own trace id (the Apex
      invocable generates one per callout), so the Apex → bridge → OpenAI
      hops arrive under a second trace, folded into the turn's call path by
      time window. The agent's action passes bridge target "openai-rest"
      explicitly — the pinned input that keeps this experiment off Claude.
      Market research is labeled as synthetic demo intel.
    flow:
      - source: agentforce-client
        target: agentforce
        protocol: agentforce-api
        detail: >-
          You talk to the OpenAI-paired Agentforce twin over the GA Agent
          API (session + message). Its "Customer account status" topic owns
          the whole answer and orchestrates the collaboration.
      - source: agentforce
        target: agentforce-apex
        protocol: internal
        detail: >-
          STEP 1 — internal truth: the agent calls its A2ALab: Get Account
          Summary action (Apex SOQL over Account + open Opportunities +
          open Cases). CRM data never leaves the org.
      - source: agentforce-apex
        target: bridge
        protocol: rest
        detail: >-
          STEP 2 — external delegation: the agent's A2ALab: Ask Remote Agent
          (OpenAI) action POSTs through the Named Credential (X-Bridge-Token)
          and Cloudflare tunnel to the lab bridge with target=openai-rest.
      - source: client
        target: openai-rest
        protocol: rest
        detail: >-
          The bridge resolves openai-rest in config/targets.yaml and
          forwards over the configured protocol — switch this leg to MCP or
          A2A with a yaml edit, no Salesforce redeploy.
      - source: openai-researcher
        target: openai-platform
        protocol: internal
        detail: >-
          The OpenAI agent produces the market research (Agents SDK run,
          response id recorded as platform_ref) and does NOT call its
          ask_agentforce tool back — the question explicitly says CRM data
          is already in hand. The research returns up the same path, and
          the Agentforce agent folds it into a reply with two labeled
          sections: "From our CRM" and "External market research (from the
          OpenAI research agent)".
    agents:
      - title: Agentforce service agent (OpenAI-paired twin)
        target: agentforce-a2a
        caption: >-
          Shim card — Agentforce publishes no A2A surface, so the lab's shim
          generates this card and proxies inbound A2A to the GA Agent API.
          Honest status: via-shim.
      - title: OpenAI research agent
        target: openai-a2a
        caption: >-
          Native card — generated at startup by the lab's a2a-sdk server on
          :8013 from the mounted adapter's name and description.

  adk-to-agentforce:
    af_channel_toggle: true
    title: "Google ADK → Agentforce"
    group: adk-agentforce
    summary: >-
      The Google ADK/Gemini agent on Vertex AI Agent Engine calls the
      Agentforce Agent mid-answer — reached over platform-native A2A.
    description: >-
      The lab's first NATIVE×NATIVE A2A experiment: you invoke the ADK
      research agent through Vertex AI Agent Engine's own A2A endpoint (no
      bridge, no shim — the platform itself speaks the protocol), and
      mid-answer the Gemini agent consults its ADK-paired Agentforce twin
      through its ask_agentforce tool, a cross-cloud GCP → Salesforce hop
      from inside the Agent Engine container. The outbound question carries
      the D27 delegation rider.
    target: google-adk-a2a
    via_bridge: false
    status: live
    tags: [adk, gemini, agent-engine, agentforce, agent-api]
    prompt_suffix: >-
      Answer in two clearly labeled sections. First "From the Google ADK
      agent (Gemini):" — your own contribution from your own knowledge:
      outside-in context, industry framing, or analysis of what the data
      means (never CRM facts). Then consult the Salesforce Agentforce agent
      with your ask_agentforce tool and summarize its answer under "From
      the CRM (via Agentforce):". Both sections are required — you are a
      research collaborator, not a pass-through.
    note: >-
      The call path may also show an agentforce-apex → bridge → adk-a2a leg
      folded in by time window: that is NOT a response callback — answers
      return up the same nested call stack on each request's own HTTP
      exchange. It is the twin's OWN outbound delegation (its script always
      runs STEP 2 through the bridge — the bounded self-loop, capped by the
      D27 guard). Scale-to-zero economics (personal GCP account): first
      invoke after ~15 idle minutes is a ~34s cold start — warm the runtime from the
      gear panel before demos. The ADK-interior legs (Gemini calls, the
      tool's Agent API round trip) run inside the GCP container; their lab
      trace hops are ephemeral there — platform-side telemetry lands with
      the WS2 obs source. Preview roughness recorded honestly: the public
      agent-card route 404s, so the lab client pins transport http+json
      and builds a minimal card locally.
    flow:
      - source: remote-caller
        target: google-adk-a2a
        protocol: a2a
        detail: >-
          You (the console) send an A2A message:send to the Agent Engine
          endpoint — IAM-authed (google-adc bearer), HTTP+JSON transport,
          contextId carries the session. This is the platform's OWN A2A
          surface: both ends native, the cell the lab is named for.
      - source: adk-researcher
        target: gemini
        protocol: internal
        detail: >-
          Inside the container an a2a-sdk executor (mirroring the lab's
          AdapterExecutor lifecycle) runs the ADK Runner; Gemini
          (ADK_MODEL, flash-lite tier) produces the answer.
      - source: agentforce-client
        target: agentforce
        protocol: agentforce-api
        detail: >-
          Mid-answer the model calls ask_agentforce. The container itself
          performs OAuth + session + message against the Salesforce Agent
          API — a cross-cloud GCP→Salesforce hop, D27 rider stamped on the
          outbound question, targeting the ADK-paired twin (D25).
    agents:
      - title: ADK research agent (Agent Engine)
        target: google-adk-a2a
        caption: >-
          Platform-served A2A. The public card route 404s in the current
          preview, so the lab pins transport and builds a minimal card —
          recorded honestly as preview roughness.
      - title: Agentforce service agent (ADK-paired twin)
