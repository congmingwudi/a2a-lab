# cloudflared named-tunnel ingress for the lab (M6).
# Prereqs (plan/04-runbooks.md §Network): subdomain zone lab.agenticthings.com
# on the Cloudflare Enterprise account, NS-delegated from GoDaddy;
# `cloudflared tunnel create a2a-lab` and DNS routes per hostname.
#
#   cloudflared tunnel --config deploy/tunnel/config.yml run a2a-lab

tunnel: a2a-lab
credentials-file: ~/.cloudflared/a2a-lab.json

ingress:
  - hostname: bridge.lab.agenticthings.com
    service: http://localhost:8100
  - hostname: console.lab.agenticthings.com
    service: http://localhost:8200
  # Direct exposure of the Claude agent's protocol servers (handy for
  # testing a cloud->local hop without the bridge):
  - hostname: claude-rest.lab.agenticthings.com
    service: http://localhost:8001
  - hostname: claude-mcp.lab.agenticthings.com
    service: http://localhost:8002
  - hostname: claude-a2a.lab.agenticthings.com
    service: http://localhost:8003
  - service: http_status:404
