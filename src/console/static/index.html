<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>A2A Interop Lab Console</title>
<style>
  /* Design system aligned with labs.agentforce.com: near-monochrome dark,
     SF Pro text + JetBrains/SF Mono, tinted pill badges, soft cards. */
  :root {
    --bg: #0b0b0b; --card: #161616; --card2: #1e1e1e; --elevated: #262626;
    --code: #141414; --border: #292929; --border-hi: #3a3a3a;
    --fg: #eeeeee; --muted: #8f8f8f; --primary: #cecece; --primary-fg: #0b0b0b;
    --rest: #00ab6d; --mcp: #ff9c3e; --a2a: #fd73d5; --agentforce-api: #00b0d6;
    --managed-agents-api: #9e9e9e; --internal: #636363; --err: #f9423d;
    --font-ui: "SF Pro Text", -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", "Segoe UI", "Roboto", sans-serif;
    --font-mono: "JetBrains Mono", "SF Mono", SFMono-Regular, ui-monospace, Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--fg); font: 14px/1.5 var(--font-ui); }
  code, pre, .mono { font-family: var(--font-mono); }

  header { display: flex; align-items: center; gap: 10px; padding: 14px 22px;
           border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 2; }
  header h1 { font-size: 15px; font-weight: 600; margin: 0; letter-spacing: .2px; }
  header .sub { color: var(--muted); font-size: 12px; }
  header .live { margin-left: auto; font-size: 12px; color: var(--muted); }
  header .live.on::before { content: "●"; color: var(--rest); margin-right: 5px; }

  main { display: grid; grid-template-columns: 380px 1fr; height: calc(100vh - 53px); }
  #side { border-right: 1px solid var(--border); overflow-y: auto; }
  .section-head { padding: 12px 18px 6px; font-size: 11px; font-weight: 600; color: var(--muted);
                  text-transform: uppercase; letter-spacing: .8px; display: flex; align-items: center; gap: 8px; }
  .section-head .spacer { flex: 1; }

  /* pill badges, labs-style: tinted fill + rim in the accent color */
  .badge { display: inline-block; padding: 1.5px 10px; border-radius: 999px; font: 600 11px var(--font-mono);
           color: var(--tag, var(--muted));
           background: color-mix(in srgb, var(--tag, var(--muted)) 10%, transparent);
           border: 1px solid color-mix(in srgb, var(--tag, var(--muted)) 38%, transparent); }
  .badge.rest { --tag: var(--rest); } .badge.mcp { --tag: var(--mcp); }
  .badge.a2a { --tag: var(--a2a); } .badge.agentforce-api { --tag: var(--agentforce-api); }
  .badge.managed-agents-api { --tag: var(--managed-agents-api); }
  .badge.internal { --tag: var(--internal); }
  .badge.agentforce { --tag: var(--agentforce-api); } .badge.claude { --tag: #cecece; }
  .badge.openai { --tag: var(--rest); } .badge.bridge { --tag: var(--mcp); }
  .badge.managed-agents { --tag: var(--managed-agents-api); }
  .badge.agentcore { --tag: var(--mcp); } .badge.soon { --tag: var(--muted); }

  button { font-family: var(--font-ui); cursor: pointer; }
  button.primary { background: var(--primary); color: var(--primary-fg); border: none; border-radius: 8px;
                   padding: 5px 14px; font-size: 12.5px; font-weight: 600; }
  button.primary:hover { background: #fff; }
  button.ghost, a.ghost { background: transparent; color: var(--fg); border: 1px solid var(--border);
                 border-radius: 8px; padding: 4px 12px; font-size: 12px; font-weight: 600;
                 text-decoration: none; display: inline-block; cursor: pointer; }
  button.ghost:hover, a.ghost:hover { border-color: var(--border-hi); background: var(--card2); }
  button:disabled { opacity: .4; cursor: default; }

  /* scenario cards (sidebar) — click opens the experiment workspace */
  .card { margin: 8px 14px; background: var(--card); border: 1px solid var(--border);
          border-radius: 12px; padding: 13px 14px; transition: border-color .15s ease; cursor: pointer; }
  .card:hover { border-color: var(--border-hi); }
  .card.open { border-color: var(--primary); }
  .card.soon { opacity: .55; }
  .card .head { display: flex; align-items: center; gap: 8px; }
  .card h3 { margin: 0; font-size: 13.5px; font-weight: 600; flex: 1; }
  .card p { margin: 6px 0 0; font-size: 12px; color: var(--muted); line-height: 1.45; }
  .card .foot { display: flex; align-items: center; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .card .status { font: 600 11px var(--font-mono); max-width: 130px;
                  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .card .status.ok { color: var(--rest); } .card .status.fail { color: var(--err); }
  .card .status.running { color: var(--fg); animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: .3; } }

  /* accordion for individual hop cells */
  details.cells { margin: 8px 14px 14px; border: 1px solid var(--border); border-radius: 12px;
                  background: var(--card); overflow: hidden; }
  details.cells summary { padding: 11px 14px; font-size: 12.5px; font-weight: 600; cursor: pointer;
                          color: var(--muted); list-style: none; display: flex; align-items: center; gap: 8px; }
  details.cells summary::before { content: "▸"; transition: transform .15s ease; font-size: 11px; }
  details.cells[open] summary::before { transform: rotate(90deg); }
  details.cells summary:hover { color: var(--fg); }
  .cells-controls { padding: 0 14px 8px; }
  .cells-controls label { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 6px; cursor: pointer; }
  .cells-controls input[type=checkbox] { accent-color: var(--primary); }
  .target { display: flex; align-items: center; gap: 8px; padding: 9px 14px; border-top: 1px solid var(--border); cursor: pointer; }
  .target:hover { background: var(--card2); }
  .target.open { box-shadow: inset 2px 0 0 var(--primary); }
  .target .tname { flex: 1; min-width: 0; font-size: 12.5px; }
  .target .tname .st { color: var(--muted); font-size: 11px; margin-left: 6px; }
  .target .result { font: 600 11px var(--font-mono); color: var(--muted); max-width: 100px;
                    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .target .result.ok { color: var(--rest); } .target .result.fail { color: var(--err); }
  .target .spin { color: var(--fg); animation: pulse 1s infinite; font-size: 11px; }

  /* trace list */
  .trace { padding: 10px 18px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .trace:hover, .trace.sel { background: var(--card); }
  .trace .tid { color: var(--muted); font-size: 11px; font-family: var(--font-mono); }
  .trace .meta { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; }

  /* main canvas */
  #detail { overflow-y: auto; padding: 18px 22px; }
  .empty { color: var(--muted); padding: 40px; text-align: center; }
  .detail-head { margin-bottom: 14px; }
  .detail-head .tid { color: var(--muted); font-size: 12px; font-family: var(--font-mono); }

  /* experiment workspace tab bar */
  .tabbar { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
  .tabbar h2 { margin: 0; font-size: 16px; font-weight: 600; flex: 1; }
  .tabs { display: flex; gap: 6px; margin: 0 0 8px; }
  .tabbar .tabs { margin: 0; }
  .tab { background: transparent; color: var(--muted); border: 1px solid var(--border);
         border-radius: 999px; padding: 3px 12px; font-size: 11.5px; font-weight: 600; }
  .tab:hover { color: var(--fg); border-color: var(--border-hi); }
  .tab.on { color: var(--fg); background: var(--card2); border-color: var(--border-hi); }

  /* chat (Run tab) */
  .chat { background: var(--card); border: 1px solid var(--border); border-radius: 12px;
          margin-bottom: 16px; overflow: hidden; }
  .chat-head { display: flex; align-items: center; gap: 8px; padding: 10px 16px;
               border-bottom: 1px solid var(--border); font-size: 11px; color: var(--muted);
               text-transform: uppercase; letter-spacing: .8px; font-weight: 600; }
  .chat-head .spacer { flex: 1; }
  .chat-head .sess { text-transform: none; letter-spacing: 0; font: 11px var(--font-mono); }
  .turns { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px;
           max-height: 44vh; overflow-y: auto; }
  .turns .hint { color: var(--muted); font-size: 12.5px; text-align: center; padding: 12px; }
  .turn { max-width: 82%; padding: 9px 12px; border-radius: 12px; font-size: 13px; line-height: 1.55;
          white-space: pre-wrap; word-break: break-word; }
  .turn.user { align-self: flex-end; background: var(--elevated); border: 1px solid var(--border-hi);
               border-bottom-right-radius: 4px; cursor: pointer; }
  .turn.user:hover { border-color: var(--primary); }
  .turn.user.sel { border-color: var(--primary); box-shadow: 0 0 0 1px var(--primary); }
  .turn.agent { align-self: flex-start; background: var(--card2); border: 1px solid var(--border);
                border-bottom-left-radius: 4px; }
  .turn.agent.err { border-color: color-mix(in srgb, var(--err) 55%, transparent); color: var(--err); }
  .turn.agent.running { color: var(--muted); animation: pulse 1s infinite; }
  .turn .tmeta { display: block; margin-top: 6px; font: 10.5px var(--font-mono); color: var(--muted); }
  .turn.agent .md { white-space: normal; }
  .turn.agent .md p { margin: 0 0 8px; }
  .turn.agent .md p:last-child { margin-bottom: 0; }
  .turn.agent .md ul, .turn.agent .md ol { margin: 4px 0 8px; padding-left: 20px; }
  .turn.agent .md li { margin: 3px 0; }
  .turn.agent .md h4, .turn.agent .md h5, .turn.agent .md h6 { margin: 10px 0 6px; font-size: 13px; }
  .turn.agent .md code { background: var(--code); border: 1px solid var(--border);
                         padding: 1px 5px; border-radius: 5px; font-size: 12px; }
  .turn.agent .md pre { margin: 6px 0 8px; }
  .turn.agent .md pre code { background: none; border: none; padding: 0; }
  .composer { display: flex; gap: 10px; padding: 12px 16px; border-top: 1px solid var(--border); align-items: flex-end; }
  .composer textarea { flex: 1; background: var(--code); color: var(--fg); border: 1px solid var(--border);
                       border-radius: 8px; padding: 9px 10px; font: 12.5px/1.5 var(--font-ui); resize: vertical; }
  .composer textarea::placeholder { color: var(--muted); }
  .composer textarea:focus { outline: none; border-color: var(--border-hi); }

  /* call-path flow + narrative (shared by Run tab, Details tab, trace view) */
  .flow { background: var(--card); border: 1px solid var(--border); border-radius: 12px;
          margin-bottom: 16px; overflow: hidden; }
  .flow h3 { margin: 0; padding: 11px 16px; font-size: 11px; color: var(--muted);
             text-transform: uppercase; letter-spacing: .8px; border-bottom: 1px solid var(--border); }
  .flow .desc { padding: 11px 16px; font-size: 13px; border-bottom: 1px solid var(--border); line-height: 1.6; }
  .flow .desc .stat { color: var(--muted); font-size: 12px; }
  .flow .desc code { font-size: 12px; background: var(--code); padding: 1px 5px; border-radius: 5px; }
  .flow .svgwrap { overflow-x: auto; padding: 14px 16px; }
  .flow svg { display: block; }
  .flow text { font: 11px var(--font-mono); fill: var(--fg); }
  .flow text.plabel { font-weight: 700; }
  .flow text.alabel { fill: var(--muted); font-size: 10px; }
  .flow .pbox { fill: var(--card2); stroke: var(--border); rx: 7; }
  .flow .lifeline { stroke: var(--border); stroke-dasharray: 3 4; }

  /* Details tab: numbered steps + agent cards */
  .steps { margin: 0; padding: 8px 16px 14px 36px; }
  .steps li { margin: 9px 0; font-size: 12.5px; color: var(--muted); line-height: 1.55; }
  .steps li .who { color: var(--fg); font-family: var(--font-mono); font-size: 12px; margin-left: 6px; }
  .agentrow { display: flex; align-items: center; gap: 10px; padding: 11px 16px;
              border-top: 1px solid var(--border); flex-wrap: wrap; }
  .agentrow .aname { font-weight: 600; font-size: 13px; }
  .agentrow .atarget { color: var(--muted); font-family: var(--font-mono); font-size: 11px; flex: 1; }
  .agentrow .caption { flex-basis: 100%; margin: 0; font-size: 12px; color: var(--muted); line-height: 1.45; }
  .cardbox { padding: 0 16px 14px; }
  .cardbox .curl { margin: 0 0 6px; color: var(--muted); font-family: var(--font-mono); font-size: 11px; }
  .acard { background: var(--code); border: 1px solid var(--border); border-radius: 8px; padding: 4px 12px; }
  .frow { display: grid; grid-template-columns: 110px 1fr; gap: 10px; padding: 7px 0;
          border-bottom: 1px solid var(--border); font-size: 12.5px; }
  .acard .frow:last-child { border-bottom: none; }
  .flabel { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .6px; padding-top: 2px; }
  .fval { min-width: 0; overflow-wrap: anywhere; }
  .fval p { margin: 3px 0; color: var(--muted); font-size: 12px; line-height: 1.45; }
  .fmono { font-family: var(--font-mono); font-size: 11.5px; color: var(--muted); }
  .skill { margin: 2px 0 8px; }
  .skill:last-child { margin-bottom: 2px; }

  /* raw hop cards */
  .hop { background: var(--card); border: 1px solid var(--border); border-radius: 12px;
         margin-bottom: 10px; overflow: hidden; }
  .hop-head { display: flex; align-items: center; gap: 10px; padding: 10px 16px; cursor: pointer; }
  .hop-head:hover { background: var(--card2); }
  .hop-head .route { flex: 1; font-size: 13px; }
  .hop-head .route b { color: var(--fg); }
  .hop-head .route .td { color: var(--muted); }
  .hop-head .lat { color: var(--muted); font-size: 12px; font-family: var(--font-mono); }
  .hop-head .err { color: var(--err); font-weight: 700; font-size: 12px; }
  .hop-body { display: none; border-top: 1px solid var(--border); }
  .hop.open .hop-body { display: grid; grid-template-columns: 1fr 1fr; }
  .pane { padding: 10px 16px; min-width: 0; }
  .pane + .pane { border-left: 1px solid var(--border); }
  .pane h4 { margin: 0 0 6px; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; }
  pre { background: var(--code); border: 1px solid var(--border); border-radius: 8px; padding: 10px; margin: 0;
        overflow-x: auto; white-space: pre-wrap; word-break: break-word;
        font-size: 12px; max-height: 420px; overflow-y: auto; }
</style>
</head>
<body>
<header>
  <h1>A2A Interop Lab</h1>
  <span class="sub">cross-platform agent-to-agent experiments · Agentforce × Claude × OpenAI</span>
  <span id="live" class="live">connecting…</span>
</header>
<main>
  <div id="side">
    <div class="section-head">Experiments</div>
    <div id="scenarios"></div>
    <details class="cells" id="cellsAcc">
      <summary>Protocol cells — individual hops</summary>
      <div class="cells-controls">
        <label title="Route through the bridge like the Agentforce Apex action does — the trace then shows the full loop">
          <input type="checkbox" id="viaBridge"> via bridge (Path A shape)</label>
      </div>
      <div id="targets"></div>
    </details>
    <div class="section-head">Traces
      <span class="spacer"></span>
      <button class="ghost" id="clearBtn" onclick="clearTraces()"
        title="Delete the trace files (traces/*.jsonl) — chat history stays until you reload">Clear</button>
    </div>
    <div id="list"></div>
  </div>
  <div id="detail"></div>
</main>
<script>
// ---------------------------------------------------------------------------
// State
// ---------------------------------------------------------------------------
let traces = [];          // [{trace_id, started, hops, protocols}]
let selected = null;      // trace_id shown in the trace section / trace view
let openHops = new Set();
let scenarios = [];       // from /api/scenarios (incl. flow + agents)
let targets = [];         // from /api/targets
let runState = {};        // key -> {state: running|ok|fail, note}   (sidebar chips)
let defaultQuestion = "";

// Main-canvas view: null | {type:'experiment', kind:'scenario'|'cell', name}
//                        | {type:'trace'}
let view = null;
let activeTab = "run";    // 'run' | 'details' (experiment views)
let mainKey = null;       // skeleton identity — rebuilt only when this changes

// Per-experiment chat: key -> {session, turns:[{role, text, trace_id, latency_ms, error}], running}
let chats = {};
let drafts = {};          // key -> composer draft (survives re-renders)

// Details-tab agent card viewer
let cardCache = {};       // target -> /api/agent-card response
let openCards = new Set();
let cardTab = {};         // target -> "fields" | "json"

const fmtTime = ts => ts ? new Date(ts * 1000).toLocaleTimeString() : "";
const esc = s => String(s).replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));
const expKey = (kind, name) => (kind === "scenario" ? "scn:" : "cell:") + name;

// When the console runs behind the tunnel with A2ALAB_TOKEN set, the token
// arrives as ?token=... on the page URL and must ride along on API calls
// (EventSource can't set headers, hence query param).
const apiUrl = path => path + window.location.search;

const newTraceId = () => (crypto.randomUUID ? crypto.randomUUID().replace(/-/g, "")
  : Array.from(crypto.getRandomValues(new Uint8Array(16)), b => b.toString(16).padStart(2, "0")).join(""));

// Minimal, safe markdown for agent replies: input is HTML-escaped FIRST, then
// only our own tags are injected — bold/italic/inline code, fenced code
// blocks, #-headers, bullet and numbered lists, paragraphs.
function inlineMd(s) {
  return s
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/\*\*([^*]+)\*\*/g, "<b>$1</b>")
    .replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, "$1<i>$2</i>");
}

function mdToHtml(src) {
  const lines = esc(src).split(/\r?\n/);
  const out = [];
  let list = null, code = false, para = [];
  const flushPara = () => { if (para.length) { out.push("<p>" + para.map(inlineMd).join("<br>") + "</p>"); para = []; } };
  const closeList = () => { if (list) { out.push("</" + list + ">"); list = null; } };
  for (const line of lines) {
    if (line.trim().startsWith("```")) {
      flushPara(); closeList();
      out.push(code ? "</code></pre>" : "<pre><code>");
      code = !code; continue;
    }
    if (code) { out.push(line + "\n"); continue; }
    const h = line.match(/^(#{1,4})\s+(.*)/);
    const ul = line.match(/^\s*[-*]\s+(.*)/);
    const ol = line.match(/^\s*\d+[.)]\s+(.*)/);
    if (h) { flushPara(); closeList(); const lvl = Math.min(h[1].length + 3, 6);
      out.push(`<h${lvl}>` + inlineMd(h[2]) + `</h${lvl}>`); }
    else if (ul) { flushPara(); if (list !== "ul") { closeList(); out.push("<ul>"); list = "ul"; }
      out.push("<li>" + inlineMd(ul[1]) + "</li>"); }
    else if (ol) { flushPara(); if (list !== "ol") { closeList(); out.push("<ol>"); list = "ol"; }
      out.push("<li>" + inlineMd(ol[1]) + "</li>"); }
    else if (!line.trim()) { flushPara(); closeList(); }
    else para.push(line);
  }
  flushPara(); closeList();
  if (code) out.push("</code></pre>");
  return out.join("");
}

function pretty(payload) {
  if (payload == null) return "—";
  if (typeof payload === "string") {
    try { return JSON.stringify(JSON.parse(payload), null, 2); } catch { return payload; }
  }
  return JSON.stringify(payload, null, 2);
}

// ---------------------------------------------------------------------------
// Call-path diagram + narrative (shared)
// ---------------------------------------------------------------------------
const PROTO_COLOR = {
  rest: "var(--rest)", mcp: "var(--mcp)", a2a: "var(--a2a)",
  "agentforce-api": "var(--agentforce-api)", "managed-agents-api": "var(--managed-agents-api)",
  internal: "var(--internal)",
};

function participantsOf(t) {
  const seen = [];
  for (const h of t.hops) {
    for (const name of [h.source, h.target]) {
      if (!seen.includes(name)) seen.push(name);
    }
  }
  return seen;
}

function describeTrace(t) {
  const hops = t.hops;
  const protos = new Set(hops.map(h => h.protocol));
  const tgts = new Set(hops.map(h => h.target));
  const parts = [];

  const bridgeHop = hops.find(h => h.target === "bridge");
  if (bridgeHop) {
    const fromApex = bridgeHop.source === "agentforce-apex";
    const outbound = hops.find(h => h.source === "client" || (h.source === "bridge" && h.target !== "bridge"));
    parts.push(`<b>Path A (via bridge):</b> ${fromApex
      ? "the Agentforce side called out through its Named Credential to the bridge"
      : "a caller invoked the bridge"}, which forwarded the request over <b>${
      esc(outbound ? outbound.protocol : "?")}</b> to <b>${esc(outbound ? outbound.target : "the target agent")}</b> — protocol switching happens here, with no Salesforce redeploy.`);
  } else if (tgts.has("agentforce-service-agent")) {
    const entry = hops.find(h => h.target === "agentforce-service-agent");
    parts.push(`<b>Via-shim cell:</b> a caller reached the Agentforce agent over <b>${esc(entry.protocol)}</b> through the lab's shim, which translated the request to the Salesforce Agent API (Agentforce exposes no GA ${esc(entry.protocol.toUpperCase())} inbound surface).`);
  } else {
    const entry = hops.find(h => ["remote-caller", "caller"].includes(h.source));
    if (entry) {
      parts.push(`<b>Direct cell:</b> a caller invoked <b>${esc(entry.target)}</b> over <b>${esc(entry.protocol)}</b>.`);
    }
  }

  if (tgts.has("anthropic-managed-agents")) {
    parts.push(`The Claude agent's reasoning ran on <b>Anthropic Managed Agents</b> (hosted session, SSE event stream).`);
  } else if (tgts.has("claude-agent-sdk")) {
    parts.push(`The Claude agent's reasoning ran on the self-hosted <b>Claude Agent SDK</b>.`);
  }

  const afHops = hops.filter(h => h.protocol === "agentforce-api");
  const claudeInvolved = tgts.has("anthropic-managed-agents") || tgts.has("claude-agent-sdk");
  if (afHops.length) {
    const lifecycle = afHops.map(h => (h.transport_detail || "").split(" ")[0]).join(" → ");
    if (claudeInvolved) {
      parts.push(`<b>Path B:</b> mid-answer, Claude called its <code>ask_agentforce</code> tool, which drove the Salesforce <b>Agent API</b> (${esc(lifecycle)}) and folded the Agentforce agent's reply into Claude's answer.`);
    } else {
      parts.push(`The Salesforce <b>Agent API</b> handled the conversation (${esc(lifecycle)}).`);
    }
  } else if (claudeInvolved) {
    parts.push(`<b>No cross-platform hop this turn:</b> Claude answered without calling its
      <code>ask_agentforce</code> tool — either the prompt directed it not to (the
      Agentforce → Claude scenario keeps the loop one-way on purpose), or the model decided it
      didn't need Salesforce data, e.g. a follow-up reusing what an earlier turn already fetched.`);
  }

  const errs = hops.filter(h => h.status === "error").length;
  if (errs) parts.push(`<span style="color:var(--err)">${errs} hop${errs > 1 ? "s" : ""} errored.</span>`);

  const ts = hops.map(h => h.ts).filter(Boolean);
  const wall = ts.length ? Math.round((Math.max(...ts.map((x, i) => x + (hops[i].latency_ms || 0) / 1000)) - Math.min(...ts)) * 1000) : null;
  const stat = `<span class="stat">${hops.length} hop${hops.length === 1 ? "" : "s"} · ${participantsOf(t).length} participants · protocols: ${[...protos].join(", ")}${wall != null ? ` · ~${wall} ms wall` : ""}</span>`;
  return (parts.join(" ") || "Call path recorded from raw wire traces.") + "<br>" + stat;
}

function renderDiagram(t) {
  const parts = participantsOf(t);
  const COL = Math.max(150, Math.min(230, 900 / parts.length));
  const TOP = 34, ROW = 34, BOXH = 24;
  const width = parts.length * COL, height = TOP + t.hops.length * ROW + 16;
  const x = name => parts.indexOf(name) * COL + COL / 2;

  let svg = `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" role="img" aria-label="call path diagram">`;
  svg += `<defs>` + Object.entries(PROTO_COLOR).map(([p, c]) =>
    `<marker id="arr-${p}" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto">
       <path d="M0,0 L8,4 L0,8 z" fill="${c}"/></marker>`).join("") + `</defs>`;

  for (const name of parts) {
    const cx = x(name);
    svg += `<line class="lifeline" x1="${cx}" y1="${TOP}" x2="${cx}" y2="${height - 6}"/>`;
    const label = name.length > 24 ? name.slice(0, 23) + "…" : name;
    const w = Math.min(COL - 10, label.length * 6.8 + 16);
    svg += `<rect class="pbox" x="${cx - w / 2}" y="4" width="${w}" height="${BOXH}"/>`;
    svg += `<text class="plabel" x="${cx}" y="${4 + BOXH / 2 + 4}" text-anchor="middle">${esc(label)}</text>`;
  }

  t.hops.forEach((h, i) => {
    const y = TOP + i * ROW + 18;
    const color = PROTO_COLOR[h.protocol] || "var(--muted)";
    let x1 = x(h.source), x2 = x(h.target);
    if (x1 === x2) x2 = x1 + 24; // self-call: short stub arrow
    const dir = x2 > x1 ? 1 : -1;
    svg += `<line x1="${x1}" y1="${y}" x2="${x2 - 4 * dir}" y2="${y}" stroke="${color}" stroke-width="1.6" marker-end="url(#arr-${h.protocol in PROTO_COLOR ? h.protocol : "internal"})" ${h.status === "error" ? 'stroke-dasharray="5 3"' : ""}/>`;
    const mid = (x1 + x2) / 2;
    const label = `${h.protocol}${h.latency_ms != null ? " · " + h.latency_ms + "ms" : ""}${h.status === "error" ? " · ERROR" : ""}`;
    svg += `<text class="alabel" x="${mid}" y="${y - 5}" text-anchor="middle"${h.status === "error" ? ' fill="var(--err)"' : ""}>${esc(label)}</text>`;
  });
  return svg + `</svg>`;
}

function traceSectionHtml(t, title) {
  if (!t || !t.hops.length) {
    return `<div class="flow"><h3>${esc(title)}</h3>
      <div class="desc"><span class="stat">No hops yet — run a turn and the call path streams in live.</span></div></div>`;
  }
  return `
    <div class="flow">
      <h3>${esc(title)} <span style="text-transform:none;letter-spacing:0"> · trace ${esc(t.trace_id.slice(0, 12))}…</span></h3>
      <div class="desc">${describeTrace(t)}</div>
      <div class="svgwrap">${renderDiagram(t)}</div>
    </div>` + t.hops.map((h, i) => {
      const key = t.trace_id + ":" + i;
      return `
      <div class="hop ${openHops.has(key) ? "open" : ""}" id="hop-${i}">
        <div class="hop-head" onclick="toggle('${key}', ${i})">
          <span class="badge ${h.protocol}">${h.protocol}</span>
          <span class="route">${esc(h.source)} → <b>${esc(h.target)}</b>
            <span class="td"> · ${esc(h.transport_detail || "")}</span></span>
          ${h.status === "error" ? `<span class="err">ERROR</span>` : ""}
          <span class="lat">${h.latency_ms != null ? h.latency_ms + " ms" : ""} · ${fmtTime(h.ts)}</span>
        </div>
        <div class="hop-body">
          <div class="pane"><h4>request (raw wire)</h4><pre>${esc(pretty(h.request_payload_raw))}</pre></div>
          <div class="pane"><h4>response (raw wire)</h4><pre>${esc(pretty(h.response_payload_raw))}</pre></div>
        </div>
      </div>`;
    }).join("");
}

// Two-step clear (no native confirm() dialog): first click arms the button,
// second click within 4s deletes traces/*.jsonl via the API.
let clearArmed = null;
window.clearTraces = async () => {
  const btn = document.getElementById("clearBtn");
  if (!clearArmed) {
    btn.textContent = "Really clear?";
    clearArmed = setTimeout(() => { clearArmed = null; btn.textContent = "Clear"; }, 4000);
    return;
  }
  clearTimeout(clearArmed); clearArmed = null;
  btn.disabled = true;
  try {
    const r = await fetch(apiUrl("/api/traces"), { method: "DELETE" });
    const data = await r.json();
    btn.textContent = `Cleared ${data.removed} file${data.removed === 1 ? "" : "s"}`;
  } catch (e) {
    btn.textContent = "Clear failed";
  }
  setTimeout(() => { btn.textContent = "Clear"; btn.disabled = false; }, 3000);
  traces = [];
  selected = null;
  openHops.clear();
  if (view && view.type === "trace") view = null;
  renderSidebar(); renderMain(true);
};

window.openExperiment = (kind, name, tab) => {
  view = { type: "experiment", kind, name };

  const key = expKey(kind, name);
  if (!chats[key]) chats[key] = { session: "ui-chat-" + name + "-" + Date.now(), turns: [], running: false };
  if (drafts[key] === undefined) drafts[key] = defaultQuestion;
  renderSidebar(); renderMain();
};

window.openTrace = tid => { view = { type: "trace" }; selected = tid; renderSidebar(); renderMain(); };
window.setTab = tab => { activeTab = tab; renderMain(); };
window.selectTurn = tid => { selected = tid; renderMain(); };

window.resetChat = () => {
  if (!view || view.type !== "experiment") return;
  const key = expKey(view.kind, view.name);
  chats[key] = { session: "ui-chat-" + view.name + "-" + Date.now(), turns: [], running: false };
  renderMain(true);
};

function currentExperiment() {
  if (!view || view.type !== "experiment") return null;
  if (view.kind === "scenario") return scenarios.find(s => s.name === view.name);
  return targets.find(t => t.name === view.name);
}

function chatTurnsHtml(chat) {
  if (!chat.turns.length && !chat.running) {
    return `<div class="hint">You're the end user of whichever agent this experiment starts from.
      Every turn shares one session, so the agents keep context — the call path for each turn appears below.</div>`;
  }
  return chat.turns.map(turn => {
    if (turn.role === "user") {
      return `<div class="turn user ${turn.trace_id === selected ? "sel" : ""}"
        onclick="selectTurn('${esc(turn.trace_id)}')" title="Show this turn's call path below">${esc(turn.text)}
        <span class="tmeta">you · trace ${esc((turn.trace_id || "").slice(0, 12))}…</span></div>`;
    }
    if (turn.role === "running") {
      return `<div class="turn agent running">agents are talking…</div>`;
    }
    const err = !!turn.error;
    return `<div class="turn agent ${err ? "err" : ""}">${err ? esc(turn.error) : `<div class="md">${mdToHtml(turn.text)}</div>`}
      <span class="tmeta">${err ? "failed" : "agent"}${turn.latency_ms != null ? ` · ${turn.latency_ms} ms` : ""}</span></div>`;
  }).join("");
}

async function sendTurn(kind, name, message) {
  const key = expKey(kind, name);
  const chat = chats[key];
  if (!chat || chat.running) return false;

  const trace_id = newTraceId();
  chat.running = true;
  chat.turns.push({ role: "user", text: message, trace_id });
  chat.turns.push({ role: "running" });
  runState[key] = { state: "running" };
  selected = trace_id;
  traces.unshift({ trace_id, started: Date.now() / 1000, hops: [], protocols: [] });
  renderSidebar(); renderMain();

  const body = { trace_id, message, session_id: chat.session };
  if (kind === "scenario") body.scenario = name;
  else {
    body.target = name;
    body.via_bridge = document.getElementById("viaBridge")?.checked || false;
  }

  let result;
  try {
    const r = await fetch(apiUrl("/api/run"), {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify(body),
    });
    result = await r.json();
  } catch (e) {
    result = { ok: false, error: String(e) };
  }

  chat.turns.pop(); // remove the running placeholder
  if (result.ok) {
    chat.turns.push({ role: "agent", text: result.text || "(empty response)", latency_ms: result.latency_ms, trace_id });
    runState[key] = { state: "ok", note: `PASS · ${result.latency_ms} ms` };
  } else {
    chat.turns.push({ role: "agent", error: result.error || result.detail || "FAIL", trace_id });
    runState[key] = { state: "fail", note: result.error || result.detail || "FAIL" };
  }
  chat.running = false;
  renderSidebar(); renderMain();
  // Backfill from disk: SSE is the live tail, but if the stream dropped
  // mid-run (console restart, laptop sleep) its missed events are gone for
  // good — the authoritative trace files are not.
  refreshTraces();
  return result.ok === true;
}

window.sendChat = () => {
  if (!view || view.type !== "experiment") return;
  const key = expKey(view.kind, view.name);
  const input = document.getElementById("chatInput");
  const message = (input ? input.value : "").trim() || defaultQuestion;
  drafts[key] = "";
  if (input) input.value = "";
  sendTurn(view.kind, view.name, message);
};

window.chatKeydown = ev => {
  if (ev.key === "Enter" && !ev.shiftKey) { ev.preventDefault(); sendChat(); }
};

window.draftChanged = el => {
  if (view && view.type === "experiment") drafts[expKey(view.kind, view.name)] = el.value;
};

// --- Details tab ------------------------------------------------------------
window.setCardTab = (target, tab) => { cardTab[target] = tab; renderMain(true); };

window.toggleCard = async target => {
  if (openCards.has(target)) { openCards.delete(target); renderMain(true); return; }
  openCards.add(target);
  renderMain(true); // show "fetching…" immediately
  if (!cardCache[target]) {
    try {
      const r = await fetch(apiUrl("/api/agent-card/" + encodeURIComponent(target)));
      const data = await r.json();
      cardCache[target] = r.ok ? data : { ok: false, url: target, error: data.detail || r.statusText };
    } catch (e) {
      cardCache[target] = { ok: false, url: target, error: String(e) };
    }
    renderMain(true);
  }
};

// Human-readable view of an A2A AgentCard — the fields customers should be
// able to read without parsing JSON. The JSON tab always has the raw truth.
function cardFields(card) {
  const iface = (card.supportedInterfaces || [])[0] || {};
  const caps = Object.entries(card.capabilities || {}).filter(([, v]) => v === true).map(([k]) => k);
  const row = (label, val) => val ? `<div class="frow"><span class="flabel">${label}</span><span class="fval">${val}</span></div>` : "";
  const skills = (card.skills || []).map(sk => `
    <div class="skill">
      <div><b>${esc(sk.name || sk.id)}</b> <span class="fmono">${esc(sk.id || "")}</span></div>
      ${sk.description ? `<p>${esc(sk.description)}</p>` : ""}
      <div>${(sk.tags || []).map(tg => `<span class="badge internal">${esc(tg)}</span>`).join(" ")}</div>
    </div>`).join("");
  return `<div class="acard">
    ${row("Name", `<b>${esc(card.name || "—")}</b>`)}
    ${row("Description", `<p>${esc(card.description || "")}</p>`)}
    ${row("Version", esc(card.version || ""))}
    ${row("Endpoint", iface.url ? `<span class="fmono">${esc(iface.url)}</span>` : "")}
    ${row("Binding", iface.protocolBinding
      ? `${esc(iface.protocolBinding)} · A2A protocol v${esc(iface.protocolVersion || "?")}` : "")}
    ${row("Capabilities", caps.map(cp => `<span class="badge a2a">${esc(cp)}</span>`).join(" "))}
    ${row("Input modes", esc((card.defaultInputModes || []).join(", ")))}
    ${row("Output modes", esc((card.defaultOutputModes || []).join(", ")))}
    ${row("Skills", skills)}
  </div>`;
}

function agentRow(a) {
  const open = openCards.has(a.target);
  const c = cardCache[a.target];
  let body = "";
  if (open) {
    if (!c) {
      body = `<div class="cardbox"><pre>fetching live agent card…</pre></div>`;
    } else if (!c.ok) {
      body = `<div class="cardbox"><p class="curl">GET ${esc(c.url)}</p>
        <pre style="color:var(--err)">${esc(c.error)}

Is that server running? scripts/run_local.sh starts the full stack.</pre></div>`;
    } else {
      const tab = cardTab[a.target] || "fields";
      body = `<div class="cardbox"><p class="curl">GET ${esc(c.url)}</p>
        <div class="tabs">
          <button class="tab ${tab === "fields" ? "on" : ""}" onclick="setCardTab('${esc(a.target)}', 'fields')">Agent card</button>
          <button class="tab ${tab === "json" ? "on" : ""}" onclick="setCardTab('${esc(a.target)}', 'json')">JSON</button>
        </div>
        ${tab === "fields" ? cardFields(c.card) : `<pre>${esc(JSON.stringify(c.card, null, 2))}</pre>`}</div>`;
    }
  }
  return `
    <div class="agentrow">
      <span class="aname">${esc(a.title || a.target)}</span>
      <span class="atarget mono">${esc(a.target)}</span>
      <button class="ghost" onclick="toggleCard('${esc(a.target)}')">${open ? "Hide agent card" : "Show agent card"}</button>
      ${a.caption ? `<p class="caption">${esc(a.caption)}</p>` : ""}
    </div>${body}`;
}

function detailsTabHtml() {
  if (view.kind === "cell") {

// --- Main renderer -----------------------------------------------------------
// The skeleton (tab bar, chat box with composer) is rebuilt only when the view
// or tab changes; data areas (#chatTurns, #traceArea) re-render on every event
// so typing in the composer survives SSE-driven updates mid-run.
function renderMain(force) {
  const el = document.getElementById("detail");

  if (!view) {
    mainKey = "empty";
    el.innerHTML = `<div class="empty">Pick an experiment on the left — chat with it in the Run tab,
      study its architecture in the Details tab. Or open a past trace below the experiments.</div>`;
    return;
  }

  if (view.type === "trace") {
    mainKey = "trace";
    const t = traces.find(x => x.trace_id === selected);
    el.innerHTML = t ? `
      <div class="detail-head"><div class="tid">trace ${t.trace_id}</div></div>
      ${traceSectionHtml(t, "Call path")}` :
      `<div class="empty">Trace not found.</div>`;
    return;
  }

  // experiment view
  const key = expKey(view.kind, view.name);
  const chat = chats[key];
  const exp = currentExperiment();
  const title = view.kind === "scenario" ? (exp && (exp.title || exp.name)) || view.name : view.name;
  const soon = view.kind === "scenario" && exp && exp.status !== "live";
  const skeletonKey = `exp:${key}:${activeTab}`;

  if (mainKey !== skeletonKey || force) {
    mainKey = skeletonKey;
    el.innerHTML = `
      <div class="tabbar">
        <h2>${esc(title)}</h2>
        <div class="tabs">
          <button class="tab ${activeTab === "run" ? "on" : ""}" onclick="setTab('run')">Run</button>
          <button class="tab ${activeTab === "details" ? "on" : ""}" onclick="setTab('details')">Details</button>
        </div>
      </div>
      ${activeTab === "run" ? `
        <div class="chat">
          <div class="chat-head">Conversation
            <span class="spacer"></span>
            <span class="sess">session ${esc(chat.session.slice(-8))}</span>
            <button class="ghost" onclick="resetChat()">New chat</button>
          </div>
          <div class="turns" id="chatTurns"></div>
          <div class="composer">
            <textarea id="chatInput" rows="3" ${soon ? "disabled" : ""}
              placeholder="${soon ? "This experiment isn't runnable yet — see the Details tab." : "Message the agent — Enter to send, Shift+Enter for a new line."}"
              oninput="draftChanged(this)" onkeydown="chatKeydown(event)"></textarea>
            <button class="primary" id="sendBtn" onclick="sendChat()" ${soon ? "disabled" : ""}>Send</button>
          </div>
        </div>
        <div id="traceArea"></div>` :
      `<div id="detailsArea"></div>`}`;
    const input = document.getElementById("chatInput");
    if (input) input.value = drafts[key] || "";
  }

  if (activeTab === "run") {
    const turnsEl = document.getElementById("chatTurns");
    turnsEl.innerHTML = chatTurnsHtml(chat);
    turnsEl.scrollTop = turnsEl.scrollHeight;
    const sendBtn = document.getElementById("sendBtn");
    if (sendBtn && !soon) sendBtn.disabled = chat.running;
    const t = traces.find(x => x.trace_id === selected);
    const owned = chat.turns.some(turn => turn.trace_id === selected);
    document.getElementById("traceArea").innerHTML = owned || chat.running
      ? traceSectionHtml(t, "Call path — selected turn")
      : `<div class="flow"><h3>Call path</h3><div class="desc"><span class="stat">Send a turn — its live
          call path and raw wire traces appear here. Click any of your past turns to revisit its path.</span></div></div>`;
  } else {
    document.getElementById("detailsArea").innerHTML = detailsTabHtml();
  }
}

// ---------------------------------------------------------------------------
// Bootstrap: traces, launchers, SSE live tail
// ---------------------------------------------------------------------------
async function load() {
  const r = await fetch(apiUrl("/api/traces"));
  const data = await r.json();
  traces = data.traces;
  renderList();
  renderMain();
}

// Re-sync from the trace files (the source of truth) and merge with any
// local placeholders for runs the server hasn't flushed yet.
async function refreshTraces() {
  try {
    const r = await fetch(apiUrl("/api/traces"));
    const data = await r.json();
    const server = data.traces;
    const known = new Set(server.map(t => t.trace_id));
    for (const t of traces) if (!known.has(t.trace_id)) server.push(t);
    server.sort((a, b) => (b.started || 0) - (a.started || 0));
    traces = server;
    renderList();
    renderMain();
  } catch { /* transient — SSE keeps flowing regardless */ }
}

async function loadLaunchers() {
  const [sr, tr] = await Promise.all([fetch(apiUrl("/api/scenarios")), fetch(apiUrl("/api/targets"))]);
  scenarios = (await sr.json()).scenarios;
  const tdata = await tr.json();
  targets = tdata.targets;
  defaultQuestion = tdata.default_question || "";
  renderSidebar();
}

function connectStream() {
  const live = document.getElementById("live");
  const es = new EventSource(apiUrl("/api/stream"));
  es.addEventListener("hello", () => {
    live.textContent = "live"; live.classList.add("on");
    // Fires on reconnect too: the server tails from current EOF, so events
    // written while disconnected never arrive via SSE — backfill from disk.
    refreshTraces();
  });
  es.onmessage = ev => {
    const hop = JSON.parse(ev.data);
    let t = traces.find(x => x.trace_id === hop.trace_id);
    if (!t) {
      t = { trace_id: hop.trace_id, started: hop.ts, hops: [], protocols: [] };
      traces.unshift(t);
    }
    // Dedup against hops already merged in by refreshTraces().
    if (t.hops.some(h => h.hop_seq === hop.hop_seq && h.ts === hop.ts
        && h.source === hop.source && h.target === hop.target)) { renderList(); return; }
    t.hops.push(hop);
    t.hops.sort((a, b) => (a.ts - b.ts) || (a.hop_seq - b.hop_seq));
    if (!t.protocols.includes(hop.protocol)) t.protocols.push(hop.protocol);
    renderList();
    if (selected === hop.trace_id) renderMain();
  };
  es.onerror = () => { live.textContent = "reconnecting…"; live.classList.remove("on"); };
}

load().then(connectStream);
loadLaunchers().then(renderMain);
</script>
