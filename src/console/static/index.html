<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>A2A Interop Lab Console</title>
<style>
  :root {
    --bg: #0e1116; --panel: #161b22; --panel2: #1c2330; --line: #2b3648;
    --text: #dbe4f0; --dim: #8b98ab; --accent: #58a6ff;
    --rest: #3fb950; --mcp: #d29922; --a2a: #bc8cff;
    --agentforce: #58a6ff; --managed: #ff7b72; --internal: #8b98ab;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
         font: 14px/1.5 ui-monospace, "SF Mono", Menlo, Consolas, monospace; }
  header { display: flex; align-items: baseline; gap: 12px; padding: 14px 20px;
           border-bottom: 1px solid var(--line); position: sticky; top: 0; background: var(--bg); z-index: 2; }
  header h1 { font-size: 16px; margin: 0; letter-spacing: .5px; }
  header .live { font-size: 12px; color: var(--dim); }
  header .live.on::before { content: "●"; color: var(--rest); margin-right: 5px; }
  main { display: grid; grid-template-columns: 360px 1fr; height: calc(100vh - 51px); }
  #side { border-right: 1px solid var(--line); overflow-y: auto; display: flex; flex-direction: column; }
  .section-head { padding: 8px 14px; font-size: 11px; color: var(--dim); text-transform: uppercase;
                  letter-spacing: .5px; border-bottom: 1px solid var(--line); background: var(--panel);
                  position: sticky; top: 0; z-index: 1; }
  #experiments { border-bottom: 1px solid var(--line); }
  #experiments .controls { padding: 10px 14px; border-bottom: 1px solid var(--line); }
  #experiments textarea { width: 100%; background: var(--panel2); color: var(--text);
                          border: 1px solid var(--line); border-radius: 6px; padding: 8px;
                          font: 12px/1.5 inherit; resize: vertical; min-height: 54px; }
  #experiments textarea::placeholder { color: var(--dim); }
  #experiments .controls .row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  #experiments label { font-size: 12px; color: var(--dim); display: flex; align-items: center; gap: 5px; cursor: pointer; }
  button.run, button.runall { background: var(--panel2); color: var(--text); border: 1px solid var(--line);
                              border-radius: 6px; padding: 3px 12px; font: 600 12px inherit; cursor: pointer; }
  button.run:hover, button.runall:hover { border-color: var(--accent); color: var(--accent); }
  button.runall { margin-left: auto; }
  button:disabled { opacity: .45; cursor: default; }
  .target { display: flex; align-items: center; gap: 8px; padding: 8px 14px;
            border-bottom: 1px solid var(--line); }
  .target .tname { flex: 1; min-width: 0; }
  .target .tname .nm { cursor: pointer; }
  .target .tname .nm:hover { color: var(--accent); }
  .target .tname .st { color: var(--dim); font-size: 11px; margin-left: 6px; }
  .target .result { font-size: 11px; color: var(--dim); max-width: 110px; overflow: hidden;
                    text-overflow: ellipsis; white-space: nowrap; }
  .target .result.ok { color: var(--rest); }
  .target .result.fail { color: #f85149; }
  .target .spin { color: var(--accent); animation: pulse 1s infinite; font-size: 11px; }
  @keyframes pulse { 50% { opacity: .3; } }
  .trace { padding: 10px 14px; border-bottom: 1px solid var(--line); cursor: pointer; }
  .trace:hover, .trace.sel { background: var(--panel); }
  .trace .tid { color: var(--dim); font-size: 11px; }
  .trace .meta { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
  #detail { overflow-y: auto; padding: 16px 20px; }
  .badge { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 11px;
           font-weight: 600; color: #0e1116; }
  .badge.rest { background: var(--rest); } .badge.mcp { background: var(--mcp); }
  .badge.a2a { background: var(--a2a); } .badge.agentforce-api { background: var(--agentforce); }
  .badge.managed-agents-api { background: var(--managed); }
  .badge.internal { background: var(--internal); }
  .hop { background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
         margin-bottom: 12px; overflow: hidden; }
  .hop-head { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; }
  .hop-head .route { flex: 1; }
  .hop-head .route b { color: var(--accent); }
  .hop-head .lat { color: var(--dim); font-size: 12px; }
  .hop-head .err { color: #f85149; font-weight: 700; }
  .hop-body { display: none; border-top: 1px solid var(--line); }
  .hop.open .hop-body { display: grid; grid-template-columns: 1fr 1fr; }
  .pane { padding: 10px 14px; min-width: 0; }
  .pane + .pane { border-left: 1px solid var(--line); }
  .pane h4 { margin: 0 0 6px; font-size: 11px; color: var(--dim); text-transform: uppercase; }
  pre { background: var(--panel2); border-radius: 6px; padding: 10px; margin: 0;
        overflow-x: auto; white-space: pre-wrap; word-break: break-word;
        font-size: 12px; max-height: 420px; overflow-y: auto; }
  .empty { color: var(--dim); padding: 40px; text-align: center; }
  .detail-head { margin-bottom: 14px; }
  .detail-head .tid { color: var(--dim); font-size: 12px; }
  .flow { background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
          margin-bottom: 16px; overflow: hidden; }
  .flow h3 { margin: 0; padding: 10px 14px; font-size: 11px; color: var(--dim);
             text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid var(--line); }
  .flow .desc { padding: 10px 14px; font-size: 13px; color: var(--text);
                border-bottom: 1px solid var(--line); line-height: 1.6; }
  .flow .desc .stat { color: var(--dim); font-size: 12px; }
  .flow .svgwrap { overflow-x: auto; padding: 12px 14px; }
  .flow svg { display: block; }
  .flow text { font: 11px ui-monospace, "SF Mono", Menlo, Consolas, monospace; fill: var(--text); }
  .flow text.plabel { font-weight: 700; }
  .flow text.alabel { fill: var(--dim); font-size: 10px; }
  .flow .pbox { fill: var(--panel2); stroke: var(--line); rx: 6; }
  .flow .lifeline { stroke: var(--line); stroke-dasharray: 3 4; }
</style>
</head>
<body>
<header>
  <h1>A2A Interop Lab</h1>
  <span id="live" class="live">connecting…</span>
</header>
<main>
  <div id="side">
    <div id="experiments">
      <div class="section-head">Experiments</div>
      <div class="controls">
        <textarea id="prompt" placeholder="Your prompt — you're the end user (of the Claude researcher, or of the Agentforce agent). Empty = the default protocol question."></textarea>
        <div class="row">
          <label><input type="checkbox" id="keepSession"> keep session (multi-turn)</label>
          <label title="Route through the bridge like the Agentforce Apex action does — the trace then shows the full loop: caller → bridge → agent → (Agentforce) → back">
            <input type="checkbox" id="viaBridge"> via bridge (Path A shape)</label>
          <button class="runall" id="runAllBtn" onclick="runAll()">Run all</button>
        </div>
      </div>
      <div id="targets"><div class="empty" style="padding:14px">Loading targets…</div></div>
    </div>
    <div class="section-head">Traces</div>
    <div id="list"></div>
  </div>
  <div id="detail"><div class="empty">Select a conversation — hops appear live as agents talk.</div></div>
</main>
<script>
let traces = [];        // [{trace_id, started, hops, protocols}]
let selected = null;
let openHops = new Set();

const fmtTime = ts => ts ? new Date(ts * 1000).toLocaleTimeString() : "";
const esc = s => String(s).replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));

function pretty(payload) {
  if (payload == null) return "—";
  if (typeof payload === "string") {
    try { return JSON.stringify(JSON.parse(payload), null, 2); } catch { return payload; }
  }
  return JSON.stringify(payload, null, 2);
}

function renderList() {
  const el = document.getElementById("list");
  el.innerHTML = traces.map(t => `
    <div class="trace ${t.trace_id === selected ? "sel" : ""}" onclick="select('${t.trace_id}')">
      <div>${fmtTime(t.started)} · ${t.hops.length} hop${t.hops.length === 1 ? "" : "s"}</div>
      <div class="tid">${t.trace_id.slice(0, 16)}…</div>
      <div class="meta">${t.protocols.map(p => `<span class="badge ${p}">${p}</span>`).join("")}</div>
    </div>`).join("") || `<div class="empty">No traces yet.</div>`;
}

// ---- Call-path diagram + narrative ---------------------------------------
// Both are derived purely from the trace's hops, so they work for any
// experiment — known lab flows (Path A via bridge, Path B ask_agentforce,
// via-shim cells) get a specific narrative, everything else a generic one.

const PROTO_COLOR = {
  rest: "var(--rest)", mcp: "var(--mcp)", a2a: "var(--a2a)",
  "agentforce-api": "var(--agentforce)", "managed-agents-api": "var(--managed)",
  internal: "var(--internal)",
};

function participantsOf(t) {
  const seen = [];
  for (const h of t.hops) {
    for (const name of [h.source, h.target]) {
      if (!seen.includes(name)) seen.push(name);
    }
  }
  return seen;
}

function describeTrace(t) {
  const hops = t.hops;
  const protos = new Set(hops.map(h => h.protocol));
  const targets = new Set(hops.map(h => h.target));
  const sources = new Set(hops.map(h => h.source));
  const parts = [];

  const bridgeHop = hops.find(h => h.target === "bridge");
  if (bridgeHop) {
    const fromApex = bridgeHop.source === "agentforce-apex";
    const outbound = hops.find(h => h.source === "client" || (h.source === "bridge" && h.target !== "bridge"));
    parts.push(`<b>Path A (via bridge):</b> ${fromApex
      ? "an Agentforce Apex action called out through its Named Credential to the bridge"
      : "a caller invoked the bridge"}, which forwarded the request over <b>${
      esc(outbound ? outbound.protocol : "?")}</b> to <b>${esc(outbound ? outbound.target : "the target agent")}</b> — protocol switching happens here, with no Salesforce redeploy.`);
  } else if (targets.has("agentforce-service-agent")) {
    const entry = hops.find(h => h.target === "agentforce-service-agent");
    parts.push(`<b>Via-shim cell:</b> a caller reached the Agentforce agent over <b>${esc(entry.protocol)}</b> through the lab's shim, which translated the request to the Salesforce Agent API (Agentforce exposes no GA ${esc(entry.protocol.toUpperCase())} inbound surface).`);
  } else {
    const entry = hops.find(h => ["remote-caller", "caller"].includes(h.source));
    if (entry) {
      parts.push(`<b>Direct cell:</b> a caller invoked <b>${esc(entry.target)}</b> over <b>${esc(entry.protocol)}</b>.`);
    }
  }

  if (targets.has("anthropic-managed-agents")) {
    parts.push(`The Claude agent's reasoning ran on <b>Anthropic Managed Agents</b> (hosted session, SSE event stream).`);
  } else if (targets.has("claude-agent-sdk")) {
    parts.push(`The Claude agent's reasoning ran on the self-hosted <b>Claude Agent SDK</b>.`);
  }

  const afHops = hops.filter(h => h.protocol === "agentforce-api");
  if (afHops.length) {
    const claudeInvolved = targets.has("anthropic-managed-agents") || targets.has("claude-agent-sdk");
    const lifecycle = afHops.map(h => (h.transport_detail || "").split(" ")[0]).join(" → ");
    if (claudeInvolved && !bridgeHop) {
      parts.push(`<b>Path B:</b> mid-answer, Claude called its <code>ask_agentforce</code> tool, which drove the Salesforce <b>Agent API</b> (${esc(lifecycle)}) and folded the Agentforce agent's reply into Claude's answer.`);
    } else {
      parts.push(`The Salesforce <b>Agent API</b> handled the conversation (${esc(lifecycle)}).`);
    }
  }

  const errs = hops.filter(h => h.status === "error").length;
  if (errs) parts.push(`<span style="color:#f85149">${errs} hop${errs > 1 ? "s" : ""} errored.</span>`);

  const ts = hops.map(h => h.ts).filter(Boolean);
  const wall = ts.length ? Math.round((Math.max(...ts.map((x, i) => x + (hops[i].latency_ms || 0) / 1000)) - Math.min(...ts)) * 1000) : null;
  const stat = `<span class="stat">${hops.length} hop${hops.length === 1 ? "" : "s"} · ${participantsOf(t).length} participants · protocols: ${[...protos].join(", ")}${wall != null ? ` · ~${wall} ms wall` : ""}</span>`;
  return (parts.join(" ") || "Call path recorded from raw wire traces.") + "<br>" + stat;
}

function renderDiagram(t) {
  const parts = participantsOf(t);
  const COL = Math.max(150, Math.min(230, 900 / parts.length));
  const TOP = 34, ROW = 34, BOXH = 24;
  const width = parts.length * COL, height = TOP + t.hops.length * ROW + 16;
  const x = name => parts.indexOf(name) * COL + COL / 2;

  let svg = `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" role="img" aria-label="call path diagram">`;
  svg += `<defs>` + Object.entries(PROTO_COLOR).map(([p, c]) =>
    `<marker id="arr-${p}" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto">
       <path d="M0,0 L8,4 L0,8 z" fill="${c}"/></marker>`).join("") + `</defs>`;

  for (const name of parts) {
    const cx = x(name);
    svg += `<line class="lifeline" x1="${cx}" y1="${TOP}" x2="${cx}" y2="${height - 6}"/>`;
    const label = name.length > 24 ? name.slice(0, 23) + "…" : name;
    const w = Math.min(COL - 10, label.length * 6.8 + 16);
    svg += `<rect class="pbox" x="${cx - w / 2}" y="4" width="${w}" height="${BOXH}"/>`;
    svg += `<text class="plabel" x="${cx}" y="${4 + BOXH / 2 + 4}" text-anchor="middle">${esc(label)}</text>`;
  }

  t.hops.forEach((h, i) => {
    const y = TOP + i * ROW + 18;
    const color = PROTO_COLOR[h.protocol] || "var(--dim)";
    let x1 = x(h.source), x2 = x(h.target);
    if (x1 === x2) x2 = x1 + 24; // self-call: short stub arrow
    const dir = x2 > x1 ? 1 : -1;
    svg += `<line x1="${x1}" y1="${y}" x2="${x2 - 4 * dir}" y2="${y}" stroke="${color}" stroke-width="1.6" marker-end="url(#arr-${h.protocol in PROTO_COLOR ? h.protocol : "internal"})" ${h.status === "error" ? 'stroke-dasharray="5 3"' : ""}/>`;
    const mid = (x1 + x2) / 2;
    const label = `${h.protocol}${h.latency_ms != null ? " · " + h.latency_ms + "ms" : ""}${h.status === "error" ? " · ERROR" : ""}`;
    svg += `<text class="alabel" x="${mid}" y="${y - 5}" text-anchor="middle"${h.status === "error" ? ' fill="#f85149"' : ""}>${esc(label)}</text>`;
  });
  return svg + `</svg>`;
}

function renderDetail() {
  const el = document.getElementById("detail");
  const t = traces.find(x => x.trace_id === selected);
  if (!t) { el.innerHTML = `<div class="empty">Select a conversation.</div>`; return; }
  el.innerHTML = `
    <div class="detail-head">
      <div class="tid">trace ${t.trace_id}</div>
    </div>
    <div class="flow">
      <h3>Call path</h3>
      <div class="desc">${describeTrace(t)}</div>
      <div class="svgwrap">${renderDiagram(t)}</div>
    </div>` + t.hops.map((h, i) => {
      const key = t.trace_id + ":" + i;
      return `
      <div class="hop ${openHops.has(key) ? "open" : ""}" id="hop-${i}">
        <div class="hop-head" onclick="toggle('${key}', ${i})">
          <span class="badge ${h.protocol}">${h.protocol}</span>
          <span class="route">${esc(h.source)} → <b>${esc(h.target)}</b>
            <span style="color:var(--dim)"> · ${esc(h.transport_detail || "")}</span></span>
          ${h.status === "error" ? `<span class="err">ERROR</span>` : ""}
          <span class="lat">${h.latency_ms != null ? h.latency_ms + " ms" : ""} · ${fmtTime(h.ts)}</span>
        </div>
        <div class="hop-body">
          <div class="pane"><h4>request (raw wire)</h4><pre>${esc(pretty(h.request_payload_raw))}</pre></div>
          <div class="pane"><h4>response (raw wire)</h4><pre>${esc(pretty(h.response_payload_raw))}</pre></div>
        </div>
      </div>`;
    }).join("");
}

window.select = tid => { selected = tid; renderList(); renderDetail(); };
window.toggle = (key, i) => {
  openHops.has(key) ? openHops.delete(key) : openHops.add(key);
  document.getElementById("hop-" + i).classList.toggle("open");
};

// ---- Experiment launcher ---------------------------------------------------
// Each target from config/targets.yaml gets a Run button; "Run all" sweeps
// every cell sequentially as the whole-solution health check. Runs mint the
// trace_id client-side and select it immediately, so hops stream into the
// diagram while the agents are still talking.

let targets = [];                 // [{name, platform, protocol, status}]
let runState = {};                // name -> {state: running|ok|fail, note}
let runningAll = false;

const newTraceId = () => (crypto.randomUUID ? crypto.randomUUID().replace(/-/g, "")
  : Array.from(crypto.getRandomValues(new Uint8Array(16)), b => b.toString(16).padStart(2, "0")).join(""));

function renderTargets() {
  const el = document.getElementById("targets");
  if (!targets.length) { el.innerHTML = `<div class="empty" style="padding:14px">No targets configured.</div>`; return; }
  el.innerHTML = targets.map(t => {
    const r = runState[t.name];
    const status = !r ? "" :
      r.state === "running" ? `<span class="spin">running…</span>` :
      `<span class="result ${r.state}" title="${esc(r.note || "")}">${esc(r.note || r.state)}</span>`;
    return `
    <div class="target">
      <span class="badge ${t.protocol}">${t.protocol}</span>
      <span class="tname">
        <span class="nm" title="platform: ${esc(t.platform)}">${esc(t.name)}</span>
        <span class="st">${esc(t.status)}</span>
      </span>
      ${status}
      <button class="run" onclick="runTarget('${esc(t.name)}')"
        ${r && r.state === "running" || runningAll ? "disabled" : ""}>Run</button>
    </div>`;
  }).join("");
}

async function loadTargets() {
  const r = await fetch(apiUrl("/api/targets"));
  const data = await r.json();
  targets = data.targets;
  renderTargets();
}

window.runTarget = async name => {
  const trace_id = newTraceId();
  const message = document.getElementById("prompt").value.trim();
  const keep = document.getElementById("keepSession").checked;
  runState[name] = { state: "running" };
  renderTargets();

  // Select the (empty) trace now — hops stream in live over SSE.
  traces.unshift({ trace_id, started: Date.now() / 1000, hops: [], protocols: [] });
  select(trace_id);

  try {
    const r = await fetch(apiUrl("/api/run"), {
      method: "POST",
      headers: { "content-type": "application/json" },
      body: JSON.stringify({
        target: name,
        message,
        trace_id,
        session_id: keep ? "ui-" + name : null,
        via_bridge: document.getElementById("viaBridge").checked,
      }),
    });
    const data = await r.json();
    runState[name] = data.ok
      ? { state: "ok", note: `PASS · ${data.latency_ms} ms` }
      : { state: "fail", note: data.error || "FAIL" };
  } catch (e) {
    runState[name] = { state: "fail", note: String(e) };
  }
  renderTargets();
  return runState[name].state === "ok";
};

window.runAll = async () => {
  if (runningAll) return;
  runningAll = true;
  const btn = document.getElementById("runAllBtn");
  btn.disabled = true;
  let pass = 0;
  for (const t of targets) {                 // sequential: kind to org limits
    if (await runTarget(t.name)) pass++;
  }
  btn.textContent = `Run all — ${pass}/${targets.length} PASS`;
  setTimeout(() => { btn.textContent = "Run all"; }, 8000);
  runningAll = false;
  btn.disabled = false;
  renderTargets();
};

// When the console runs behind the tunnel with A2ALAB_TOKEN set, the token
// arrives as ?token=... on the page URL and must ride along on API calls
// (EventSource can't set headers, hence query param).
const apiUrl = path => path + window.location.search;

async function load() {
  const r = await fetch(apiUrl("/api/traces"));
  const data = await r.json();
  traces = data.traces;
  renderList();
  if (selected) renderDetail();
}

function connectStream() {
  const live = document.getElementById("live");
  const es = new EventSource(apiUrl("/api/stream"));
  es.addEventListener("hello", () => { live.textContent = "live"; live.classList.add("on"); });
  es.onmessage = ev => {
    const hop = JSON.parse(ev.data);
    let t = traces.find(x => x.trace_id === hop.trace_id);
    if (!t) {
      t = { trace_id: hop.trace_id, started: hop.ts, hops: [], protocols: [] };
      traces.unshift(t);
    }
    t.hops.push(hop);
    t.hops.sort((a, b) => (a.ts - b.ts) || (a.hop_seq - b.hop_seq));
    if (!t.protocols.includes(hop.protocol)) t.protocols.push(hop.protocol);
    renderList();
    if (selected === hop.trace_id) renderDetail();
  };
  es.onerror = () => { live.textContent = "reconnecting…"; live.classList.remove("on"); };
}

load().then(connectStream);
loadTargets();
</script>
</body>
</html>
